services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass
      POSTGRES_DB: pmproject
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmproject"]
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"

  # ── PgBouncer — connection pooler ──────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    expose:
      - "6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "pmuser"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis — cache, Celery broker, WebSocket pub/sub ────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Nginx — reverse proxy, load balancer, rate limiter ─────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI backend (multi-worker uvicorn behind Nginx) ────────────
  backend:
    build: ./backend
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  # ── Celery worker — async task processing ──────────────────────────
  celery-worker:
    build: ./backend
    restart: always
    command: >
      celery -A app.celery_app:celery worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      -Q default
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  # ── Celery Beat — periodic task scheduler ──────────────────────────
  celery-beat:
    build: ./backend
    restart: always
    command: >
      celery -A app.celery_app:celery beat
      --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: always
    expose:
      - "3000"
    environment:
      VITE_API_URL: http://localhost
      VITE_WS_URL: ws://localhost/ws
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  redisdata:
