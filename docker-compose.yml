services:
  # ── PostgreSQL primary ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass
      POSTGRES_DB: pmproject
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmproject"]
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"

  # ── PostgreSQL read replica (optional; enable with --profile replica)
  db-replica:
    image: postgres:16-alpine
    restart: always
    profiles: ["replica"]
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass
      POSTGRES_DB: pmproject
    volumes:
      - pgreplica:/var/lib/postgresql/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmproject"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PgBouncer — connection pooler ──────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    expose:
      - "6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "pmuser"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis cache (hot data, read-through) ───────────────────────────
  redis-cache:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - rediscache:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis broker (Celery tasks + results) ──────────────────────────
  redis-broker:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redisbroker:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1000
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis websocket pub/sub ────────────────────────────────────────
  redis-ws:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Nginx — reverse proxy, load balancer, rate limiter ─────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI backend (scalable; override with --scale backend=N) ────
  backend:
    build: ./backend
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      # Uncomment to route read-only endpoints to the replica (requires --profile replica):
      # READ_DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject_read
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis-cache:6379/0
      REDIS_WS_URL: redis://redis-ws:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis-broker:6379/1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-ws:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    deploy:
      replicas: 2

  # ── Celery worker — default queue (lightweight work) ───────────────
  celery-worker:
    build: ./backend
    restart: always
    command: >
      celery -A app.celery_app:celery worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      -Q default
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis-cache:6379/0
      REDIS_WS_URL: redis://redis-ws:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis-broker:6379/1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    deploy:
      replicas: 2

  # ── Celery worker — reports queue (heavy/slow jobs) ────────────────
  celery-reports:
    build: ./backend
    restart: always
    command: >
      celery -A app.celery_app:celery worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      -Q reports
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis-cache:6379/0
      REDIS_WS_URL: redis://redis-ws:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis-broker:6379/1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  # ── Celery Beat — periodic task scheduler ──────────────────────────
  celery-beat:
    build: ./backend
    restart: always
    command: >
      celery -A app.celery_app:celery beat
      --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://pmuser:pmpass@pgbouncer:6432/pmproject
      SECRET_KEY: change-me-in-production
      REDIS_URL: redis://redis-cache:6379/0
      REDIS_WS_URL: redis://redis-ws:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis-broker:6379/1
    depends_on:
      redis-broker:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: always
    expose:
      - "3000"
    environment:
      VITE_API_URL: http://localhost
      VITE_WS_URL: ws://localhost/ws
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  pgreplica:
  rediscache:
  redisbroker:
