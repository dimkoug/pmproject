[databases]
; Route all connections for "pmproject" to the real Postgres host
pmproject = host=db port=5432 dbname=pmproject

; Read replica — only served when the "replica" compose profile is active.
; The `db-replica` host falls back to primary when the service is not running
; (the PgBouncer alias will fail-closed; the backend logs a warning and the
; read-db engine never issues queries until the replica is healthy).
pmproject_read = host=db-replica port=5432 dbname=pmproject

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — best for web apps with short-lived queries.
; Connections are returned to the pool after each transaction completes.
pool_mode = transaction

; Pool sizing (widened 2025-04 — step #7 of scaling plan)
; max_client_conn  = total client connections PgBouncer will accept
; default_pool_size = server connections per user/database pair
; reserve_pool_size = extra connections for burst traffic
; min_pool_size     = always keep this many server connections open
max_client_conn = 2000
default_pool_size = 60
reserve_pool_size = 15
min_pool_size = 10

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 120
server_connect_timeout = 15

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Stats
stats_period = 60

; Admin access
admin_users = pmuser
