worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens   off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────────
    # General API: 30 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Auth endpoints: 5 requests/sec per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream: uvicorn backend (4 workers) ──────────────────────
    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    # ── Upstream: frontend dev server ──────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    # ── Main server ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── Health check (bypass rate limiting) ────────────────────
        location = /api/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Auth endpoints (stricter rate limit) ───────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── WebSocket endpoint ─────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── API endpoints ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;

            # Response caching for GET requests
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
        }

        # ── Frontend (React/Vite) ──────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Error pages ───────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"detail":"Too many requests. Please slow down."}';
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 503 '{"detail":"Service temporarily unavailable. Please try again."}';
        }
    }
}
